name: Refresh trip data

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install requests

      - name: Fetch offers
        run: python scripts/fetch.py

      - name: Build trip-data.ts
        run: python scripts/build.py

      - name: Commit changes
        run: |
          git config user.name "eurokaefer-bot"
          git config user.email "bot@eurokaefer.app"
          git add src/data/trip-data.ts data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "refresh: $(date -u +%FT%TZ)"
            # Resolve any concurrent-run conflict by keeping our freshly-generated data.
            # In a rebase, -X theirs means "prefer the commit being replayed" (our data).
            if ! git pull --rebase -X theirs origin main; then
              # Fallback: abort rebase and force-push our generated data
              git rebase --abort
              git push --force-with-lease
            else
              git push
            fi
          fi

      - name: Trigger Vercel deploy
        run: curl -s -X POST "$VERCEL_DEPLOY_HOOK"
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
