name: Refresh trip data

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install requests

      - name: Fetch offers
        run: python scripts/fetch.py

      - name: Search chains
        run: python scripts/search.py

      - name: Build trip-data.ts
        run: python scripts/build.py

      - name: Commit changes
        run: |
          git config user.name "eurokaefer-bot"
          git config user.email "bot@eurokaefer.app"
          git add src/data/trip-data.ts data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "refresh: $(date -u +%FT%TZ)"
            git pull --rebase origin main
            git push
          fi
